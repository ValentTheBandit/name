<!DOCTYPE html>
<html lang="en">

<head>

<title>Responsive Navbar</title>

<!-- Hamburger ikon -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<body>

<h2>Responsive Navbar</h2>
